# Pre-commit hooks — keep trivial formatting fixes out of PRs so
# reviewers can focus on real code. Install once per clone:
#
#     pip install pre-commit
#     pre-commit install
#
# Tier-1 hooks run on every commit; heavier checks (pytest, pnpm test)
# stay in CI to avoid slowing the local loop.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [ts, tsx, javascript, jsx, json, css, markdown]
        additional_dependencies:
          - "prettier@3.4.2"
          - "prettier-plugin-tailwindcss@0.6.9"
