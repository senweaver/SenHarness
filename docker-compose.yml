# ═══════════════════════════════════════════════════════════════
# SenHarness · development stack (default — `docker compose up -d`)
#
# This file is the dev-mode default: source code is bind-mounted,
# uvicorn runs with --reload, Next.js runs `pnpm dev`. Code edits in
# `backend/app/**` and `frontend/src/**` take effect without rebuilding
# the image.
#
# For production use the standalone `docker-compose.prod.yml`
# (see its header for the deployment recipe).
# ═══════════════════════════════════════════════════════════════

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-senharness}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senharness}
      POSTGRES_DB: ${DB_NAME:-senharness}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-senharness} -d ${DB_NAME:-senharness}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: "true"
      # Container-internal listen port must stay stable (8000). Host publish
      # is controlled by the `ports` mapping below (`BACKEND_PORT` on the left).
      # If we let `.env` override BACKEND_PORT inside the container (e.g. 8100),
      # healthcheck and frontend base URL drift out of sync.
      BACKEND_PORT: 8000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-senharness}
      DB_PASSWORD: ${DB_PASSWORD:-senharness}
      DB_NAME: ${DB_NAME:-senharness}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SENHARNESS_MASTER_KEY: ${SENHARNESS_MASTER_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-do-not-use-in-production!!}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      STORAGE_LOCAL_PATH: /data/storage
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/cli:/app/cli
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - storage_data:/data/storage
      # Mount host Docker socket so the DockerSandbox capability can spawn
      # per-run sandbox containers on the host daemon. Dev-only: in prod
      # use a dedicated sidecar or DinD for stronger isolation.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    command: ["arq", "app.worker.arq_app.WorkerSettings"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      REDIS_HOST: redis
      SENHARNESS_MASTER_KEY: ${SENHARNESS_MASTER_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-do-not-use-in-production!!}
      STORAGE_LOCAL_PATH: /data/storage
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/cli:/app/cli
    # Worker is not an HTTP server; inherit-backend healthcheck would always fail.
    healthcheck:
      disable: true

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    command: ["python", "-m", "cli.commands", "scheduler", "run"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      REDIS_HOST: redis
      SENHARNESS_MASTER_KEY: ${SENHARNESS_MASTER_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-do-not-use-in-production!!}
      STORAGE_LOCAL_PATH: /data/storage
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/cli:/app/cli
    # Scheduler is not an HTTP server; disable inherited `/readyz` probe.
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    command: ["pnpm", "exec", "next", "dev", "--port", "3000"]
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SenHarness}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-zh-CN}
      SENHARNESS_INTERNAL_API_BASE_URL: http://backend:8000
      # Windows / Docker Desktop bind mounts don't always propagate inotify
      # events. Force the file watchers to poll so HMR fires reliably.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/messages:/app/messages
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
  redis_data:
  storage_data:
