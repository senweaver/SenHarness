name: Feature request
description: Propose a new feature or a meaningful improvement.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and discussions and could not find a duplicate.
          required: true
        - label: I read the relevant `docs/*.md` page and confirmed this is not already supported.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation is this addressing? Avoid jumping straight to a solution.
      placeholder: |
        Today, when I ..., SenHarness ...
        This means I have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? UX sketch, API shape, config knob, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - backend (FastAPI / agents)
        - frontend (Next.js)
        - runtime (workers / scheduler / channels)
        - skills / harness contracts
        - docs
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, etc.
