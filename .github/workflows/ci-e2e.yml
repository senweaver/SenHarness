name: ci-e2e

# Playwright end-to-end suite. Runs against a full docker-compose stack
# (Postgres + Redis + backend). Kept out of the PR-blocking workflow
# (ci.yml) because the full stack spin-up + suite takes several minutes
# and the E2E matrix is inherently higher-variance than unit tests.
#
# Triggers:
#   * nightly cron — catches drift between infra + frontend.
#   * workflow_dispatch — on-demand runs from the Actions tab.
#   * pull_request with label `needs-e2e` — opt-in for risky PRs.

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC nightly
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Only run on PR events when the `needs-e2e` label is present. Scheduled
    # and manual runs always proceed.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'needs-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SENHARNESS_MASTER_KEY: test-master-key-do-not-use-in-prod-123456789
      JWT_SECRET_KEY: test-jwt-secret-do-not-use-in-prod
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Stack: Postgres + Redis + backend + worker via compose ───────
      - name: Bring up backend stack (db + redis + backend)
        run: |
          set -euxo pipefail
          # Only spin up the non-frontend services; we build the Next.js app
          # locally so Playwright can serve it via `pnpm start` and we get
          # Playwright's tracing instead of opaque container logs.
          docker compose up -d --wait db redis backend worker

      - name: Wait for backend health
        run: |
          set -euxo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health; then
              echo; echo "backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy" >&2
          docker compose logs --tail=200 backend >&2 || true
          exit 1

      # ── Frontend + Playwright ────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
        run: pnpm build

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js in background
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
        run: |
          nohup pnpm start > ../next.log 2>&1 &
          echo "Next.js PID: $!"
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Next.js is up"
              exit 0
            fi
            sleep 2
          done
          echo "Next.js never became ready" >&2
          cat ../next.log >&2 || true
          exit 1

      - name: Run Playwright e2e
        working-directory: frontend
        env:
          CI: "1"
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # Set these in repo secrets to enable admin-* specs. When absent
          # those specs `test.skip` with a clear message rather than fail.
          E2E_PLATFORM_ADMIN_EMAIL: ${{ secrets.E2E_PLATFORM_ADMIN_EMAIL }}
          E2E_PLATFORM_ADMIN_PASSWORD: ${{ secrets.E2E_PLATFORM_ADMIN_PASSWORD }}
        run: pnpm test:e2e --reporter=github

      # ── Artifacts (traces, videos, screenshots, container logs) ──────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

      - name: Upload container logs
        if: failure()
        run: |
          mkdir -p logs
          docker compose logs backend > logs/backend.log || true
          docker compose logs db > logs/db.log || true
          docker compose logs redis > logs/redis.log || true
          docker compose logs worker > logs/worker.log || true
        shell: bash

      - name: Upload container logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
