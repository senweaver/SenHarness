name: ci

# Single CI workflow for SenHarness — three parallel jobs:
#   * lint        · ruff / ty / eslint — fails fast on style
#   * backend     · pure unit tests (`pytest -m "not requires_db"`)
#   * frontend    · vitest, typecheck, next build
#
# The backend job deliberately does NOT provision Postgres / Redis /
# alembic. Any test transitively using a DB-bound fixture is tagged
# ``requires_db`` by ``backend/tests/conftest.py`` and deselected here.
# The full suite (DB-backed unit tests + tests/integration/ + Playwright
# E2E) runs locally via `make test` / `pnpm test:e2e`; those depend on
# a real stack and would only flake on every PR.

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══ Lint ══════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend (ruff / ty)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Backend deps
        working-directory: backend
        run: uv sync --all-extras --dev
      - name: Ruff check
        working-directory: backend
        run: uv run ruff check .
      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .
      - name: Type check (ty, soft-gate)
        working-directory: backend
        run: uv run ty check app || true

      # Frontend (eslint + tsc)
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: eslint
        working-directory: frontend
        run: pnpm lint
      - name: typecheck
        working-directory: frontend
        run: pnpm typecheck

  # ═══ Backend unit tests (no external services) ════════════
  backend-test:
    runs-on: ubuntu-latest
    env:
      SENHARNESS_MASTER_KEY: test-master-key-do-not-use-in-prod-123456789
      JWT_SECRET_KEY: test-jwt-secret-do-not-use-in-prod
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - run: uv python install 3.12
      - name: Sync deps
        working-directory: backend
        run: uv sync --all-extras --dev
      - name: Unit tests (DB-free, with coverage)
        working-directory: backend
        run: |
          uv run pytest tests/unit -m "not requires_db" \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ═══ Frontend tests (vitest) ══════════════════════════════
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Vitest
        working-directory: frontend
        run: pnpm test
      - name: Build (smoke)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
        run: pnpm build
